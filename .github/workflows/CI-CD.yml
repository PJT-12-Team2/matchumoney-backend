name: deploy-dockerhub

on:
  push:
    branches: ["develop"]

permissions:
  contents: read

env:
  IMAGE_NAME: matchumoney-backend     # Docker Hub 저장소명(계정/IMAGE_NAME)
  IMAGE_TAG: latest                      # 학습용 latest 고정

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ✅ 단순화: JAR은 빌드만 하면 됨 (Dockerfile이 build/libs/*.jar를 복사)
      - name: Build with Gradle
        run: ./gradlew build -x test --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ✅ 단순화: JAR 복사/이름변경 없이 바로 빌드
      - name: Build & push image to Docker Hub
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -e
          docker build -t ${DOCKER_USER}/${IMAGE_NAME}:${IMAGE_TAG} .
          docker push    ${DOCKER_USER}/${IMAGE_NAME}:${IMAGE_TAG}

      # --- (선택) EC2에 docker-compose 배포 ---
      - name: Send compose to EC2
        if: always()   # 필요 없으면 이 스텝부터 삭제
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY:  ${{ secrets.EC2_SSH_KEY }}
        run: |
          printf '%s' "$KEY" | sed 's/\r$//' > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ${USER}@${HOST} "mkdir -p ~/app"
          scp -o StrictHostKeyChecking=no -i key.pem docker-compose.yml ${USER}@${HOST}:~/app/

      - name: SSH & deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: matchumoney-backend
          IMAGE_TAG: latest
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          AWS_REGION_RT: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          echo "$KEY_B64" | base64 -d > key.pem
          chmod 600 key.pem

          ssh -o StrictHostKeyChecking=no -i key.pem ${USER}@${HOST} "
            set -e
            cd ~/app

            # .env 생성 (heredoc X, 들여쓰기/컬럼0 걱정 X)
            printf '%s\n' \
              'SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}' \
              'SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}' \
              'SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}' \
              'REDIS_HOST=${REDIS_HOST}' \
              'REDIS_PORT=${REDIS_PORT}' \
              'AWS_REGION=${AWS_REGION_RT}' \
              'S3_BUCKET=${S3_BUCKET}' \
              'JWT_SECRET=${JWT_SECRET}' \
              'EMAIL_USERNAME=${EMAIL_USERNAME}' \
              'EMAIL_PASSWORD=${EMAIL_PASSWORD}' \
              'KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}' \
              'KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}' \
              'OPENAI_API_KEY=${OPENAI_API_KEY}' \
            > .env

            # Docker Hub 로그인
            echo '${DOCKERHUB_TOKEN}' | docker login -u '${DOCKERHUB_USER}' --password-stdin

            # 이미지 pull & 기동 (IMAGE 환경변수로 주입)
            IMAGE='${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}' docker compose pull
            IMAGE='${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}' docker compose up -d

            # 필요없는 이미지 정리
            docker image prune -f
          "