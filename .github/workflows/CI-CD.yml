name: deploy

on:
  push:
    branches: ["develop"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: latest   # 개인 학습용이니까 latest 고정
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build jar
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar --no-daemon
          JAR_PATH=$(ls -1 build/libs/*.jar | head -n1)
          cp "$JAR_PATH" app.jar

      - name: Send bundle to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY:  ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem && chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ${USER}@${HOST} "mkdir -p ~/app"
          tar czf deploy.tgz app.jar Dockerfile docker-compose.yml
          scp -o StrictHostKeyChecking=no -i key.pem deploy.tgz ${USER}@${HOST}:~/app/

      - name: SSH & deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
          DB_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          DB_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          DB_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          echo "$KEY" > key.pem && chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ${USER}@${HOST} <<'EOF'
            set -e
            cd ~/app
            tar xzf deploy.tgz

            # Firebase JSON 파일 생성
            echo "$FIREBASE_CREDENTIALS_JSON" > firebase-key.json

            # .env 파일 생성
            cat > .env <<EOT
            SPRING_DATASOURCE_URL=${DB_URL}
            SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
            SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
            AWS_REGION=${AWS_REGION}
            S3_BUCKET=${S3_BUCKET}
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_SECRET=${JWT_SECRET}
            EMAIL_USERNAME=${EMAIL_USERNAME}
            EMAIL_PASSWORD=${EMAIL_PASSWORD}
            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            GOOGLE_APPLICATION_CREDENTIALS=/home/ec2-user/app/firebase-key.json
            EOT
            
            docker compose up -d --build
            
            docker image prune -f
            EOF