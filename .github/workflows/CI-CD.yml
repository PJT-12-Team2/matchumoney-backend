name: deploy-dockerhub

on:
  push:
    branches: ["develop"]   # 필요시 main 등으로 변경

permissions:
  contents: read

env:
  IMAGE_NAME: matchumoney-backend
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle (no tests)
        run: ./gradlew build -x test --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image to Docker Hub
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -e
          docker build -t ${DOCKER_USER}/${IMAGE_NAME}:${IMAGE_TAG} .
          docker push    ${DOCKER_USER}/${IMAGE_NAME}:${IMAGE_TAG}

      # ---------- SSH 키 준비 (base64 → pem) ----------
      - name: SSH & deploy on EC2
        shell: bash
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          # ↓ 여기의 IMAGE_NAME/IMAGE_TAG는 Job/Workflow env의 값을 그대로 씁니다 (소문자 확인!)
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          AWS_REGION_RT: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          set -e

          # 1) 러너에서 "완성된" IMAGE 문자열 만들기 (소문자 체크)
          IMAGE="${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Using image: $IMAGE"
          # 소문자 강제 (필요 시)
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

          # 2) SSH로 원격 실행
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i key.pem "${USER}@${HOST}" "
            set -e
            cd ~/app

            # .env 생성 (printf로 안전)
            printf '%s\n' \
              'SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}' \
              'SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}' \
              'SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}' \
              'REDIS_HOST=${REDIS_HOST}' \
              'REDIS_PORT=${REDIS_PORT}' \
              'AWS_REGION=${AWS_REGION_RT}' \
              'S3_BUCKET=${S3_BUCKET}' \
              'JWT_SECRET=${JWT_SECRET}' \
              'EMAIL_USERNAME=${EMAIL_USERNAME}' \
              'EMAIL_PASSWORD=${EMAIL_PASSWORD}' \
              'KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}' \
              'KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}' \
              'OPENAI_API_KEY=${OPENAI_API_KEY}' \
            > .env

            # (선택) Firebase 자격증명 파일
            if [ -n '${FIREBASE_CREDENTIALS_JSON}' ]; then
              printf '%s' '${FIREBASE_CREDENTIALS_JSON}' > firebase-key.json
              grep -q '^GOOGLE_APPLICATION_CREDENTIALS=' .env 2>/dev/null || \
                printf '%s\n' 'GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-key.json' >> .env
            fi

            # compose 명령 감지
            if docker compose version >/dev/null 2>&1; then
              COMPOSE='docker compose'
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE='docker-compose'
            else
              echo '❌ docker compose/docker-compose not found'; exit 1
            fi

            # Docker Hub 로그인 (프라이빗일 때 필요)
            echo '${DOCKERHUB_TOKEN}' | docker login -u '${DOCKERHUB_USER}' --password-stdin

            # 3) 이미 완성된 IMAGE 값을 사용 (원격에서 변수 결합 금지)
            IMAGE='${IMAGE}' \$COMPOSE pull
            IMAGE='${IMAGE}' \$COMPOSE up -d

            docker image prune -f
            \$COMPOSE ps
          "